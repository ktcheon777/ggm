<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 24px 20px 0;
      text-align: center;
    }

    header h1 { font-size: 1.8rem; margin-bottom: 4px; }
    header p  { font-size: 0.9rem; opacity: 0.85; padding-bottom: 20px; }


    /* ── Summary cards ── */
    .summary {
      display: flex;
      gap: 12px;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .summary-card {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .summary-card .label  { font-size: 0.75rem; color: #718096; margin-bottom: 6px; }
    .summary-card .amount { font-size: 1.1rem; font-weight: 700; }

    .income .amount  { color: #38a169; }
    .expense .amount { color: #e53e3e; }
    .balance .amount { color: #667eea; }

    /* ── Form ── */
    .form-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 16px;
    }

    .form-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .form-card h2 { font-size: 1rem; margin-bottom: 14px; color: #4a5568; }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      min-width: 120px;
      padding: 10px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-row input:focus,
    .form-row select:focus { border-color: #667eea; }

    .btn-add {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }

    .btn-add:hover { opacity: 0.9; }

    /* ── Transaction list ── */
    .list-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 32px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .list-header h2 { font-size: 1rem; color: #4a5568; }

    .btn-clear {
      font-size: 0.78rem;
      color: #e53e3e;
      background: none;
      border: 1px solid #e53e3e;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }

    .btn-clear:hover { background: #e53e3e; color: white; }

    .transaction-list { display: flex; flex-direction: column; gap: 8px; }

    .transaction-item {
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .type-badge {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .type-income  { background: #c6f6d5; }
    .type-expense { background: #fed7d7; }

    .tx-info  { flex: 1; min-width: 0; }
    .tx-desc  { font-size: 0.9rem; font-weight: 600; }
    .tx-meta  { font-size: 0.75rem; color: #a0aec0; margin-top: 2px; }

    .tx-amount            { font-size: 0.95rem; font-weight: 700; white-space: nowrap; }
    .tx-amount.income     { color: #38a169; }
    .tx-amount.expense    { color: #e53e3e; }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .btn-delete:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    /* ── Dashboard ── */
    .dashboard-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px 32px;
    }

    .dashboard-title {
      font-size: 1rem;
      color: #4a5568;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chart-title { font-size: 0.95rem; font-weight: 700; color: #4a5568; }

    .chart-legend {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: #718096;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .legend-dot.income  { background: #68d391; }
    .legend-dot.expense { background: #fc8181; }

    canvas { display: block; width: 100%; }

    /* Monthly table */
    .month-table-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .month-table-head {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      padding: 10px 16px;
      background: #f7fafc;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.72rem;
      color: #718096;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .month-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      padding: 13px 16px;
      border-bottom: 1px solid #f0f4f8;
      font-size: 0.85rem;
      align-items: center;
      transition: background 0.15s;
    }

    .month-row:last-child { border-bottom: none; }
    .month-row:hover { background: #f7fafc; }
    .month-row.current { background: #ebf4ff; }

    .month-label   { font-weight: 700; color: #4a5568; }
    .col-income    { color: #38a169; font-weight: 600; }
    .col-expense   { color: #e53e3e; font-weight: 600; }
    .col-balance   { font-weight: 700; }
    .col-positive  { color: #667eea; }
    .col-negative  { color: #e53e3e; }

    /* bar inside row */
    .bar-wrap {
      height: 4px;
      background: #e2e8f0;
      border-radius: 99px;
      margin-top: 5px;
      overflow: hidden;
      grid-column: 1 / -1;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #68d391, #667eea);
    }

    .dashboard-empty {
      text-align: center;
      color: #a0aec0;
      padding: 60px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>📒 가계부</h1>
  <p id="current-date"></p>
</header>

<div id="ledger-section">

  <div class="summary">
    <div class="summary-card income">
      <div class="label">총 수입</div>
      <div class="amount" id="total-income">₩0</div>
    </div>
    <div class="summary-card expense">
      <div class="label">총 지출</div>
      <div class="amount" id="total-expense">₩0</div>
    </div>
    <div class="summary-card balance">
      <div class="label">잔액</div>
      <div class="amount" id="balance">₩0</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-card">
      <h2>내역 추가</h2>
      <div class="form-row">
        <select id="type">
          <option value="income">수입</option>
          <option value="expense">지출</option>
        </select>
        <select id="category">
          <option value="급여">급여</option>
          <option value="용돈">용돈</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-row">
        <input type="text"   id="description" placeholder="내용 입력" maxlength="30">
        <input type="number" id="amount"       placeholder="금액 (원)" min="0">
        <input type="date"   id="date">
      </div>
      <button class="btn-add" onclick="addTransaction()">+ 추가</button>
    </div>
  </div>

  <div class="list-section">
    <div class="list-header">
      <h2>거래 내역</h2>
      <button class="btn-clear" onclick="clearAll()">전체 삭제</button>
    </div>
    <div class="transaction-list" id="transaction-list"></div>
  </div>

</div>

<div class="dashboard-section" id="dashboard-section">

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">월별 수입 / 지출</span>
      <div class="chart-legend">
        <span><span class="legend-dot income"></span>수입</span>
        <span><span class="legend-dot expense"></span>지출</span>
      </div>
    </div>
    <canvas id="monthly-chart" height="200"></canvas>
  </div>

  <div class="month-table-card">
    <div class="month-table-head">
      <div>월</div>
      <div>수입</div>
      <div>지출</div>
      <div>잔액</div>
    </div>
    <div id="monthly-rows"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://carzpomuomdifjlvhgca.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhcnpwb211b21kaWZqbHZoZ2NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Nzk0OTcsImV4cCI6MjA5NzA1NTQ5N30.SBpS7HNGosnUiUR693bhG5OuI9T2uz_EzcXPc939__s';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let transactions = [];

  const categoryEmoji = {
    급여: '💰', 용돈: '🎁', 식비: '🍚', 교통: '🚌',
    쇼핑: '🛍️', 의료: '🏥', 문화: '🎬', 기타: '📌'
  };

  /* ── Helpers ── */
  function fmt(n) { return '₩' + Math.abs(n).toLocaleString('ko-KR'); }
  function fmtY(n) {
    if (n >= 100000000) return (n / 100000000).toFixed(1).replace('.0','') + '억';
    if (n >= 10000)     return (n / 10000).toFixed(0) + '만';
    return n.toLocaleString();
  }

  function getMonthData() {
    const map = {};
    transactions.forEach(t => {
      const ym = t.date.slice(0, 7);
      if (!map[ym]) map[ym] = { income: 0, expense: 0 };
      map[ym][t.type] += t.amount;
    });
    return map;
  }

  /* ── Ledger render ── */
  function render() {
    const list = document.getElementById('transaction-list');

    const totalIncome  = transactions.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance      = totalIncome - totalExpense;

    document.getElementById('total-income').textContent  = fmt(totalIncome);
    document.getElementById('total-expense').textContent = fmt(totalExpense);
    const balEl = document.getElementById('balance');
    balEl.textContent  = fmt(balance);
    balEl.style.color  = balance >= 0 ? '#667eea' : '#e53e3e';

    if (transactions.length === 0) {
      list.innerHTML = '<div class="empty">아직 내역이 없어요.<br>첫 항목을 추가해보세요!</div>';
      renderDashboard();
      return;
    }

    const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
    list.innerHTML = sorted.map(t => `
      <div class="transaction-item">
        <div class="type-badge type-${t.type}">${categoryEmoji[t.category] || '📌'}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.description || t.category}</div>
          <div class="tx-meta">${t.category} · ${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">
          ${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}
        </div>
        <button class="btn-delete" onclick="deleteTransaction('${t.id}')">✕</button>
      </div>
    `).join('');

    renderDashboard();
  }

  /* ── Dashboard render ── */
  function renderDashboard() {
    const monthMap = getMonthData();
    const allMonths = Object.keys(monthMap).sort();

    if (allMonths.length === 0) {
      document.getElementById('monthly-rows').innerHTML =
        '<div class="dashboard-empty">데이터가 없습니다.<br>내역을 추가하면 월별 통계가 표시됩니다.</div>';
      clearCanvas();
      return;
    }

    const chartMonths = allMonths.slice(-6);
    drawBarChart(chartMonths, monthMap);
    renderMonthlyTable([...allMonths].reverse(), monthMap);
  }

  function clearCanvas() {
    const canvas = document.getElementById('monthly-chart');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function drawBarChart(months, monthMap) {
    const canvas = document.getElementById('monthly-chart');
    const W = canvas.offsetWidth || 560;
    const H = 200;
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const PAD = { top: 16, right: 12, bottom: 44, left: 52 };
    const cW = W - PAD.left - PAD.right;
    const cH = H - PAD.top  - PAD.bottom;

    const maxVal = Math.max(...months.map(m =>
      Math.max(monthMap[m].income, monthMap[m].expense)
    ), 1);

    const mag = Math.pow(10, Math.floor(Math.log10(maxVal)));
    const yMax = Math.ceil(maxVal / mag) * mag;

    const Y_STEPS = 4;
    ctx.font = `${11 * (W < 400 ? 0.85 : 1)}px Malgun Gothic, sans-serif`;

    for (let i = 0; i <= Y_STEPS; i++) {
      const y = PAD.top + cH - (i / Y_STEPS) * cH;
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(PAD.left, y);
      ctx.lineTo(PAD.left + cW, y);
      ctx.stroke();

      ctx.fillStyle  = '#a0aec0';
      ctx.textAlign  = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(fmtY((i / Y_STEPS) * yMax), PAD.left - 6, y);
    }

    const n = months.length;
    const groupW = cW / n;
    const barW   = Math.min(groupW * 0.3, 18);

    months.forEach((m, i) => {
      const cx = PAD.left + (i + 0.5) * groupW;
      const data = monthMap[m];

      const ih = (data.income / yMax) * cH;
      ctx.fillStyle = '#68d391';
      ctx.fillRect(cx - barW - 2, PAD.top + cH - ih, barW, ih);

      const eh = (data.expense / yMax) * cH;
      ctx.fillStyle = '#fc8181';
      ctx.fillRect(cx + 2, PAD.top + cH - eh, barW, eh);

      ctx.fillStyle    = '#718096';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(`${m.slice(2,4)}/${parseInt(m.slice(5,7))}`, cx, PAD.top + cH + 8);
    });

    ctx.strokeStyle = '#cbd5e0';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(PAD.left, PAD.top);
    ctx.lineTo(PAD.left, PAD.top + cH);
    ctx.lineTo(PAD.left + cW, PAD.top + cH);
    ctx.stroke();
  }

  function renderMonthlyTable(months, monthMap) {
    const today = new Date().toISOString().slice(0, 7);

    document.getElementById('monthly-rows').innerHTML = months.map(ym => {
      const d   = monthMap[ym];
      const bal = d.income - d.expense;
      const [yr, mo] = ym.split('-');
      const isCurrent = ym === today;

      return `
        <div class="month-row${isCurrent ? ' current' : ''}">
          <div class="month-label">${yr}년 ${parseInt(mo)}월${isCurrent ? ' 🔸' : ''}</div>
          <div class="col-income">${fmt(d.income)}</div>
          <div class="col-expense">${fmt(d.expense)}</div>
          <div class="col-balance ${bal >= 0 ? 'col-positive' : 'col-negative'}">
            ${bal >= 0 ? '+' : '-'}${fmt(bal)}
          </div>
        </div>`;
    }).join('');
  }

  /* ── Supabase CRUD ── */
  async function loadTransactions() {
    const { data, error } = await db
      .from('transactions')
      .select('*')
      .order('date', { ascending: false });
    if (error) { console.error(error); return; }
    transactions = data;
    render();
  }

  async function addTransaction() {
    const type        = document.getElementById('type').value;
    const category    = document.getElementById('category').value;
    const description = document.getElementById('description').value.trim();
    const amount      = parseInt(document.getElementById('amount').value);
    const date        = document.getElementById('date').value;

    if (!amount || amount <= 0) { alert('금액을 올바르게 입력해주세요.'); return; }
    if (!date)                   { alert('날짜를 선택해주세요.'); return; }

    const { error } = await db.from('transactions').insert({
      id: Date.now().toString(),
      type, category,
      description: description || category,
      amount, date
    });

    if (error) { alert('저장 실패: ' + error.message); return; }

    document.getElementById('description').value = '';
    document.getElementById('amount').value = '';
    await loadTransactions();
  }

  async function deleteTransaction(id) {
    const { error } = await db.from('transactions').delete().eq('id', id);
    if (error) { alert('삭제 실패: ' + error.message); return; }
    await loadTransactions();
  }

  async function clearAll() {
    if (!confirm('모든 내역을 삭제할까요?')) return;
    const { error } = await db.from('transactions').delete().neq('id', '');
    if (error) { alert('삭제 실패: ' + error.message); return; }
    await loadTransactions();
  }

  /* ── Event listeners ── */
  document.getElementById('amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTransaction();
  });

  document.getElementById('type').addEventListener('change', function() {
    const cat = document.getElementById('category');
    cat.innerHTML = this.value === 'income'
      ? `<option value="급여">급여</option>
         <option value="용돈">용돈</option>
         <option value="기타">기타</option>`
      : `<option value="식비">식비</option>
         <option value="교통">교통</option>
         <option value="쇼핑">쇼핑</option>
         <option value="의료">의료</option>
         <option value="문화">문화</option>
         <option value="기타">기타</option>`;
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderDashboard, 150);
  });

  /* ── Init ── */
  async function init() {
    const today = new Date();
    document.getElementById('current-date').textContent =
      today.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
    document.getElementById('date').value = today.toISOString().split('T')[0];
    await loadTransactions();
  }

  init();
</script>
</body>
</html>
